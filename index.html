<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐 🎂</title>
    <style>
        :root {
            --primary-color: #ff6b81;
            --glass-bg: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 1. 动态流动渐变背景 */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 玻璃拟态容器 */
        .container {
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            z-index: 10;
            max-width: 80%;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem); /* 响应式字体大小 */
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        /* 按钮组 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 12px 28px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            background: white;
            color: var(--primary-color);
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        button:active {
            transform: scale(0.95);
        }

        /* 性能优化后的爱心动画 */
        .heart {
            position: absolute;
            pointer-events: none; /* 防止遮挡点击 */
            z-index: 1;
            opacity: 0;
            will-change: transform; /* 提醒浏览器优化性能 */
            animation: floatUp 5s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎂 Happy Birthday</h1>
        <p>愿每一岁都奔赴在热爱里 💖</p>
        
        <div class="btn-group">
            <button onclick="showSurprise()">点击领取惊喜 🎁</button>
            <button onclick="toggleMusic()" style="background: transparent; color: white; border: 1px solid white;">🎵 音乐开关</button>
        </div>
    </div>

    <audio id="music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
    </audio>

    <script>
        // 优化后的爱心生成：使用更合理的频率并限制最大数量
        function createHeart() {
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "💖";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 20 + 15 + "px";
            
            // 随机飘动时长
            const duration = Math.random() * 3 + 4;
            heart.style.animationDuration = duration + "s";
            
            document.body.appendChild(heart);

            // 动画结束后立即移除，释放内存
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // 控制生成密度，每400ms生成一个
        setInterval(createHeart, 400);

        function showSurprise() {
            alert("✨ 愿你眼里有星辰，身边有暖阳，生日快乐！");
        }

        const music = document.getElementById("music");
        function toggleMusic() {
            if (music.paused) {
                music.play().catch(e => alert("请先点击页面任意位置，以允许播放音乐"));
            } else {
                music.pause();
            }
        }
    </script>
</body>
</html>
